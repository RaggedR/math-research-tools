# ── Collection names ──────────────────────────────────────────────────
collection_names:
  - lit_review
  - math_papers

ingest_collection: lit_review

# ── Summary generation ────────────────────────────────────────────────
summary_system_prompt: |
  You are a mathematical encyclopedia writer. Write clear, precise
  reference summaries of mathematical concepts. Use LaTeX notation ($...$ inline, $$...$$ display).
  Focus on definitions, examples, visual descriptions.

summary_sections:
  - "## Definition\nPrecise definition(s) of this concept. Include formal notation where appropriate."
  - "## Examples\nConcrete, worked examples."
  - "## Key Results\nState important findings with attribution (author, year). Include quantitative results where available."
  - "## Diagrams / Visual Description"
  - "## Connections\nHow this concept relates to other concepts in the research landscape."
  - "## References\nList the source papers cited in the passages."

# ── Level 2 theme identification ──────────────────────────────────────
theme_domain_description: |
  mathematics, focusing on q-series, partition theory, symmetric functions,
  Rogers-Ramanujan identities, Bailey lemma, crystal bases, cylindric partitions,
  quasisymmetric functions, Hall-Littlewood polynomials, and Macdonald polynomials

meta_summary_system_prompt: |
  You are a mathematical research surveyor writing comprehensive area overviews.

l2_graph_domain_description: |
  mathematics, specifically q-series, partition theory, and algebraic combinatorics

# ── Survey generation ─────────────────────────────────────────────────
survey_section_system: |
  You are an expert academic survey writer producing LaTeX content for a
  survey paper on mathematical combinatorics and q-series. Write in formal academic
  style with proper LaTeX formatting. Use \label{} for sections/subsections and
  \ref{} for cross-references. Use \cite{} for citations (cite keys are
  arxiv_NNNN_NNNNN format, e.g., arxiv_2002_00388). Do NOT include
  \begin{document} or preamble — just the section content.

survey_abstract_domain: |
  This survey provides a comprehensive review of recent advances in
  mathematical combinatorics, covering q-series, partition theory, symmetric
  functions, and related algebraic structures.

# ── Structural holes ─────────────────────────────────────────────────
cluster_description_domain: "math research"
search_query_domain: "math research"
