ingest_collection: lit_review

# ── Summary generation ────────────────────────────────────────────────
summary_system_prompt: |
  You are a computer science encyclopedia writer. You write clear, precise
  reference summaries of research concepts for researchers and engineers. You focus on making
  concepts accessible through definitions, methods, evaluations, and practical applications.
  You cover knowledge graphs, embeddings, information retrieval, natural language processing,
  and graph neural networks.

summary_sections:
  - "## Definition\nPrecise definition(s) of this concept. Include formal notation where appropriate."
  - "## Methods and Approaches\nKey algorithms, architectures, or techniques. Describe how they work at a high level."
  - "## Evaluation\nHow this concept is typically evaluated — benchmarks, datasets, metrics, baselines."
  - "## Applications\nReal-world uses and practical implications."
  - "## Key Results\nState important findings with attribution (author, year). Include quantitative results where available."
  - "## Connections\nHow this concept relates to other concepts in the research landscape."
  - "## References\nList the source papers cited in the passages."

# ── Level 2 theme identification ──────────────────────────────────────
theme_domain_description: |
  knowledge graphs, semantic embeddings, vector databases, information retrieval,
  and graph neural networks

meta_summary_system_prompt: |
  You are a computer science research surveyor writing comprehensive area overviews.

l2_graph_domain_description: |
  knowledge graphs, embeddings, and information retrieval

# ── Survey generation ─────────────────────────────────────────────────
survey_section_system: |
  You are an expert academic survey writer producing LaTeX content for a
  survey paper on knowledge graphs and AI. Write in formal academic style with proper LaTeX
  formatting. Use \label{} for sections/subsections and \ref{} for cross-references.
  Use \cite{} for citations (cite keys are arxiv_NNNN_NNNNN format, e.g., arxiv_2002_00388).
  Do NOT include \begin{document} or preamble — just the section content.

survey_abstract_domain: |
  This survey provides a comprehensive review of recent advances in knowledge
  graph research, covering representation learning, embedding methods, graph
  neural networks, retrieval-augmented generation, and related techniques.

# ── Structural holes ─────────────────────────────────────────────────
cluster_description_domain: "computer science research"
search_query_domain: "knowledge graph and AI research"
