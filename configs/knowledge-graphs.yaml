# Domain configuration: Knowledge Graphs and Information Retrieval
name: knowledge-graphs

# ── Extraction ────────────────────────────────────────────────────────
extraction_prompt: |
  You are a computer science knowledge extractor. Given text from a research paper, extract:

  1. **Concepts**: Methods, models, architectures, datasets, benchmarks, and theoretical frameworks mentioned.
  2. **Relationships**: How concepts relate to each other.

  Return JSON with this exact schema:
  {
    "concepts": [
      {
        "name": "short canonical name (e.g., 'TransE', 'knowledge graph embedding')",
        "type": "one of: method, model, architecture, dataset, benchmark, technique, framework, person, definition",
        "description": "one sentence description if clear from context"
      }
    ],
    "relationships": [
      {
        "source": "concept name (must match a concept above)",
        "target": "concept name (must match a concept above)",
        "relation": "one of: extends, outperforms, uses, is_variant_of, evaluated_on, related_to, equivalent_to, generalizes, applied_to, combined_with",
        "detail": "brief explanation"
      }
    ]
  }

  Rules:
  - Use canonical names (e.g., "TransE" not "the TransE model" or "translation-based embedding")
  - Prefer established names from the knowledge graph and NLP literature
  - Extract 3-15 concepts per passage (focus on the most important ones)
  - Only include relationships that are explicitly stated or clearly implied
  - If the text is mostly equations with little conceptual content, return fewer items
  - For people, only include them if they are credited with a specific method or result in this passage

concept_types:
  - method
  - model
  - architecture
  - dataset
  - benchmark
  - technique
  - framework
  - person
  - definition

relationship_types:
  - extends
  - outperforms
  - uses
  - is_variant_of
  - evaluated_on
  - related_to
  - equivalent_to
  - generalizes
  - applied_to
  - combined_with

