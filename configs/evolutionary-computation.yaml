# Domain configuration: Evolutionary Computation
name: evolutionary-computation

# ── Extraction ────────────────────────────────────────────────────────
extraction_prompt: |
  You are an evolutionary computation knowledge extractor. Given text from a research paper, extract:

  1. **Concepts**: Algorithms, techniques, representations, benchmarks, biological principles, and theoretical constructs mentioned.
  2. **Relationships**: How concepts relate to each other.

  Return JSON with this exact schema:
  {
    "concepts": [
      {
        "name": "short canonical name (e.g., 'MAP-Elites', 'NEAT', 'coevolutionary arms race')",
        "type": "one of: algorithm, technique, representation, benchmark, principle, metric, framework, person, definition",
        "description": "one sentence description if clear from context"
      }
    ],
    "relationships": [
      {
        "source": "concept name (must match a concept above)",
        "target": "concept name (must match a concept above)",
        "relation": "one of: extends, generalizes, uses, outperforms, is_variant_of, inspired_by, related_to, equivalent_to, combined_with, evaluated_on",
        "detail": "brief explanation"
      }
    ]
  }

  Rules:
  - Use canonical names (e.g., "MAP-Elites" not "MAP Elites" or "map-elites algorithm")
  - Prefer established names from the evolutionary computation literature
  - Extract 3-15 concepts per passage (focus on the most important ones)
  - Only include relationships that are explicitly stated or clearly implied
  - If the text is mostly equations with little conceptual content, return fewer items
  - For people, only include them if they are credited with a specific algorithm or result in this passage

concept_types:
  - algorithm
  - technique
  - representation
  - benchmark
  - principle
  - metric
  - framework
  - person
  - definition

relationship_types:
  - extends
  - generalizes
  - uses
  - outperforms
  - is_variant_of
  - inspired_by
  - related_to
  - equivalent_to
  - combined_with
  - evaluated_on

