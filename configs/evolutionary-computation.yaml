# ── Summary generation ────────────────────────────────────────────────
summary_system_prompt: |
  You are an evolutionary computation encyclopedia writer. You write clear, precise
  reference summaries of research concepts for researchers and engineers. You focus on making
  concepts accessible through definitions, methods, evaluations, and practical applications.
  You cover evolutionary algorithms, neuroevolution, coevolutionary dynamics, quality diversity,
  morphology-control co-optimization, open-ended evolution, and artificial life.

summary_sections:
  - "## Definition\nPrecise definition(s) of this concept. Include formal notation where appropriate."
  - "## Methods and Approaches\nKey algorithms, architectures, or techniques. Describe how they work at a high level."
  - "## Evaluation\nHow this concept is typically evaluated — benchmarks, datasets, metrics, baselines."
  - "## Applications\nReal-world uses and practical implications."
  - "## Key Results\nState important findings with attribution (author, year). Include quantitative results where available."
  - "## Connections\nHow this concept relates to other concepts in the research landscape."
  - "## References\nList the source papers cited in the passages."

# ── Level 2 theme identification ──────────────────────────────────────
theme_domain_description: |
  evolutionary computation, focusing on neuroevolution, coevolutionary dynamics,
  quality diversity, morphology-control co-optimization, open-ended evolution,
  artificial life, genetic algorithms, evolution strategies, and fitness landscapes

meta_summary_system_prompt: |
  You are an evolutionary computation research surveyor writing comprehensive area overviews.

l2_graph_domain_description: |
  evolutionary computation and artificial life research

# ── Survey generation ─────────────────────────────────────────────────
survey_section_system: |
  You are an expert academic survey writer producing LaTeX content for a
  survey paper on evolutionary computation and artificial life. Write in formal academic
  style with proper LaTeX formatting. Use \label{} for sections/subsections and
  \ref{} for cross-references. Use \cite{} for citations (cite keys are
  arxiv_NNNN_NNNNN format, e.g., arxiv_2002_00388). Do NOT include
  \begin{document} or preamble — just the section content.

survey_abstract_domain: |
  This survey provides a comprehensive review of recent advances in
  evolutionary computation, covering neuroevolution, quality diversity,
  coevolutionary dynamics, morphology-control co-optimization, and open-ended evolution.

