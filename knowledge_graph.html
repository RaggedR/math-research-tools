const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("svg")
  .attr("viewBox", [0, 0, width, height]);

const g = svg.append("g");

// Zoom
svg.call(d3.zoom()
  .scaleExtent([0.1, 8])
  .on("zoom", (event) => g.attr("transform", event.transform)));

// Force simulation
const simulation = d3.forceSimulation(data.nodes)
  .force("link", d3.forceLink(data.links).id(d => d.id).distance(80))
  .force("charge", d3.forceManyBody().strength(-120))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 2));

// Links
const link = g.append("g")
  .selectAll("line")
  .data(data.links)
  .join("line")
  .attr("class", "link")
  .attr("stroke", "#7799BB")
  .attr("stroke-width", 1.5);

// Nodes
const node = g.append("g")
  .selectAll("g")
  .data(data.nodes)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended));

function nodeRadius(d) {
  return Math.max(4, Math.min(20, 3 + d.degree * 1.2));
}

node.append("circle")
  .attr("r", d => nodeRadius(d))
  .attr("fill", d => d.color)
  .attr("opacity", 0.85);

node.append("text")
  .text(d => d.degree >= 3 ? d.label : "")
  .attr("x", d => nodeRadius(d) + 3)
  .attr("y", 3);

// Tooltip
const tooltip = d3.select("#tooltip");

node.on("mouseover", (event, d) => {
  tooltip.style("display", "block")
    .html(`<div class="title">${d.label}</div>
           <div class="type">${d.type}</div>
           ${d.description ? `<div class="desc">${d.description}</div>` : ''}
           <div class="stats">${d.papers} papers · ${d.degree} connections</div>`);
})
.on("mousemove", (event) => {
  tooltip.style("left", (event.pageX + 15) + "px")
         .style("top", (event.pageY - 10) + "px");
})
.on("mouseout", () => tooltip.style("display", "none"));

// Click to highlight neighborhood
node.on("click", (event, d) => {
  const neighbors = new Set();
  neighbors.add(d.id);
  data.links.forEach(l => {
    if (l.source.id === d.id) neighbors.add(l.target.id);
    if (l.target.id === d.id) neighbors.add(l.source.id);
  });

  node.select("circle")
    .attr("opacity", n => neighbors.has(n.id) ? 1 : 0.1);
  node.select("text")
    .attr("fill", n => neighbors.has(n.id) ? "#fff" : "#333")
    .text(n => neighbors.has(n.id) ? n.label : "");
  link.attr("stroke-opacity", l =>
    l.source.id === d.id || l.target.id === d.id ? 1 : 0.08);
});

// Double-click to reset
svg.on("dblclick", () => {
  node.select("circle").attr("opacity", 0.85);
  node.select("text")
    .attr("fill", "#ccc")
    .text(d => d.degree >= 3 ? d.label : "");
  link.attr("stroke-opacity", 0.7);
});

// Search
function searchNodes(query) {
  const results = document.getElementById("search-results");
  if (!query) {
    node.select("circle").attr("opacity", 0.85);
    node.select("text").attr("fill", "#ccc")
      .text(d => d.degree >= 3 ? d.label : "");
    link.attr("stroke-opacity", 0.7);
    results.textContent = "";
    return;
  }
  const q = query.toLowerCase();
  const matches = data.nodes.filter(n => n.id.includes(q) || n.label.toLowerCase().includes(q));
  const matchIds = new Set(matches.map(m => m.id));

  node.select("circle")
    .attr("opacity", n => matchIds.has(n.id) ? 1 : 0.1);
  node.select("text")
    .attr("fill", n => matchIds.has(n.id) ? "#fff" : "#333")
    .text(n => matchIds.has(n.id) ? n.label : "");

  results.textContent = `${matches.length} matches`;
}

// Tick
simulation.on("tick", () => {
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

function dragstarted(event) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  event.subject.fx = event.subject.x;
  event.subject.fy = event.subject.y;
}
function dragged(event) {
  event.subject.fx = event.x;
  event.subject.fy = event.y;
}
function dragended(event) {
  if (!event.active) simulation.alphaTarget(0);
  event.subject.fx = null;
  event.subject.fy = null;
}
</script>
</body>
</html>
